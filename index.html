<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kickoff Puzzle</title>
<style>
body{
  font-family: Arial, sans-serif;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:40px;
  overflow-x:hidden;
}

h1{
  margin-bottom:30px;
}

#board{
  display:grid;
  grid-template-columns:repeat(2,200px);
  gap:24px;
  justify-content:center;
  margin-bottom:40px;
  perspective:1000px;
}

.card{
  width:200px;
  height:200px;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 0.7s cubic-bezier(.2,.8,.2,1), box-shadow 0.4s;
  cursor:pointer;
}

.card-inner{
  position:absolute;
  width:100%;
  height:100%;
}

.card-face{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
  background:#1e293b;
}

.card-back{
  background:#334155;
  transform:rotateY(180deg);
  padding:24px;
  font-size:16px;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  gap:14px;
}

.card.flipped{
  transform:rotateY(180deg);
}

.card.active{
  position:fixed;
  top:50%;
  left:50%;
  width:520px;
  height:380px;
  transform:translate(-50%,-50%) scale(1) rotateY(180deg);
  z-index:20;
  box-shadow:0 25px 80px rgba(0,0,0,0.7);
  display:flex;
  align-items:center;
  justify-content:center;
}

/* Overlay tối phủ lên ảnh khi card active */
.card.active::after{
  content:'';
  position:absolute;
  inset:0;
  border-radius:14px;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(4px);
  z-index:1;
}

button{
  margin:6px;
  padding:10px 16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:15px;
  transition:transform .2s;
}

button:hover{
  transform:scale(1.05);
}

.correct{
  background:#22c55e;
  color:white;
}

.wrong{
  background:#ef4444;
  color:white;
}

#questionBox{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:500px;
  max-width:90vw;
  z-index:30;
  padding:24px;
  box-sizing:border-box;
}

#feedback{
  margin-top:10px;
  font-weight:bold;
}

.hidden{
  display:none;
}

#final{
  margin-top:40px;
  animation:fadeIn 1s ease forwards;
}

#speaker{
  max-width:320px;
  border-radius:16px;
  margin-top:20px;
  box-shadow:0 20px 50px rgba(0,0,0,0.5);
  transform:scale(0.8);
  animation:pop 0.8s ease forwards;
}

.logo-piece{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:14px;
}

@keyframes pop{
  to{transform:scale(1)}
}

@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}

.card.exit{
  animation:spinShrink 0.7s ease forwards;
}

@keyframes spinShrink{
  0%  {transform:translate(-50%,-50%) scale(1)   rotateY(180deg) rotate(0deg);  opacity:1}
  50% {transform:translate(-50%,-50%) scale(0.8)  rotateY(180deg) rotate(180deg);opacity:1}
  100%{transform:translate(-50%,-50%) scale(0.1)  rotateY(180deg) rotate(720deg);opacity:0}
}
</style>
</head>
<body>

<h1>Khám phá câu chuyện phía sau bộ phim</h1>

<div id="board">
  <div class="card" data-id="0"><div class="card-inner"><div class="card-face card-front-logo"><img class="logo-piece" src="photo/fyt_logo.jpg" alt="logo piece"></div><div class="card-face card-back"></div></div></div>
  <div class="card" data-id="1"><div class="card-inner"><div class="card-face card-front-logo"><img class="logo-piece" src="photo/fyt_logo.jpg" alt="logo piece"></div><div class="card-face card-back"></div></div></div>
  <div class="card" data-id="2"><div class="card-inner"><div class="card-face card-front-logo"><img class="logo-piece" src="photo/fyt_logo.jpg" alt="logo piece"></div><div class="card-face card-back"></div></div></div>
  <div class="card" data-id="3"><div class="card-inner"><div class="card-face card-front-logo"><img class="logo-piece" src="photo/fyt_logo.jpg" alt="logo piece"></div><div class="card-face card-back"></div></div></div>
</div>

<div id="questionBox" class="hidden">
  <h2 id="question"></h2>
  <div id="answers"></div>
  <p id="feedback"></p>
</div>

<div id="final" class="hidden">
  <h2>Diễn giả của buổi thảo luận</h2>
  <img id="speaker" src="photo/lehoanglinh.jpg" />
  <p>
    BTV Lê Hoàng Linh – người được giới thiệu là "kiến trúc sư trưởng" của bộ phim
    "Cuộc đọ sức của ý chí".
  </p>
</div>

<script>
const questions = [
  {
    q: "Bộ phim 'Cuộc đọ sức của ý chí' nhìn chiến tranh Việt Nam chủ yếu từ góc nhìn của quốc gia nào?",
    a: ["Mỹ","Pháp","Nhật","Hàn Quốc"],
    correct: 0
  },
  {
    q: "Nhân vật trung tâm của bộ phim là ai?",
    a: ["Henry Kissinger","Robert McNamara","John Kennedy","Richard Nixon"],
    correct: 1
  },
  {
    q: "Robert McNamara từng giữ chức vụ gì?",
    a: ["Ngoại trưởng Mỹ","Bộ trưởng Quốc phòng Mỹ","Tổng thống Mỹ","Tướng quân đội"],
    correct: 1
  },
  {
    q: "Bộ phim được thực hiện nhân dịp kỷ niệm sự kiện nào của Việt Nam?",
    a: ["30 năm thống nhất","40 năm thống nhất","50 năm thống nhất","60 năm thống nhất"],
    correct: 2
  }
]

let opened = 0
let activeCard = null

const cards = document.querySelectorAll(".card")
const questionBox = document.getElementById("questionBox")
const questionText = document.getElementById("question")
const answersBox = document.getElementById("answers")
const feedback = document.getElementById("feedback")

cards.forEach(card => {
  card.addEventListener("click", () => {
    if (activeCard) return

    const id = parseInt(card.dataset.id)  // FIX #3: parseInt để an toàn
    activeCard = card

    card.classList.add("flipped")

    setTimeout(() => {
      card.classList.add("active")
      showQuestion(id, card)
    }, 300)
  })
})

function showQuestion(id, card) {
  questionBox.classList.remove("hidden")

  const q = questions[id]
  questionText.textContent = q.q
  answersBox.innerHTML = ""
  feedback.textContent = ""

  q.a.forEach((ans, index) => {
    const btn = document.createElement("button")
    btn.textContent = ans

    btn.onclick = () => {
      if (index === q.correct) {
        feedback.textContent = "👏 Chính xác!"
        btn.classList.add("correct")
      } else {
        feedback.textContent = "❌ Sai rồi. Đáp án đúng: " + q.a[q.correct]
        btn.classList.add("wrong")
      }

      setTimeout(() => {
        questionBox.classList.add("hidden")
        card.classList.add("exit")

        setTimeout(() => {
          card.remove()
          opened++
          activeCard = null

          if (opened === 4) {
            revealFinal()
          }
        }, 400)
      }, 1200)
    }

    answersBox.appendChild(btn)
  })
}

function revealFinal() {
  document.getElementById("final").classList.remove("hidden")
}
</script>

</body>
</html>
